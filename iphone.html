<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABS 動体検知送信機</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #222;
            color: white;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 70vh;
            background-color: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #controls {
            padding: 15px;
            height: 30vh;
            box-sizing: border-box;
            background-color: #1a1a1a;
        }
        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
            width: 50%;
            text-align: center;
            margin-right: 8px;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #30d158; /* 成功を祈ってグリーンに */
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
        button:active {
            background-color: #249d41;
        }
        #status {
            color: #ffcc00;
            margin: 10px 0;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="controls">
        <input type="number" id="pc-id" pattern="[0-9]*" inputmode="numeric" placeholder="4桁のコード">
        <button id="connect-btn">接続</button>
        <p id="status">カメラを起動中...</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        
        let peer = new Peer();
        let conn = null;
        let localStream = null;

        // 1. 背面カメラの起動
        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                frameRate: { ideal: 60 } // ボールの高速移動を捉えるため60fpsを要求
            },
            audio: false
        })
        .then(stream => {
            video.srcObject = stream;
            localStream = stream;
            
            video.onloadedmetadata = () => {
                video.play()
                .then(() => {
                    statusText.textContent = "カメラ起動完了。PCと接続してください。";
                })
                .catch(err => {
                    statusText.textContent = "画面をタップして再生してください。";
                    document.body.addEventListener('click', () => {
                        video.play();
                        statusText.textContent = "カメラ映像再生中...";
                    }, { once: true });
                });
            };
        })
        .catch(err => {
            alert("カメラ起動失敗: " + err);
        });

        // PCへの接続処理
        document.getElementById('connect-btn').onclick = () => {
            const inputNum = document.getElementById('pc-id').value;
            if(!inputNum || inputNum.length !== 4) {
                alert("4桁の正しい数字を入力してください。");
                return;
            }
            const pcId = `abs-${inputNum}`; 
            statusText.textContent = "接続中...";
            
            conn = peer.connect(pcId);
            
            conn.on('open', () => {
                statusText.textContent = "接続成功！【動体検知モード】で作動中。";
                if (localStream) {
                    peer.call(pcId, localStream); // PCにカメラ映像を送信
                }
                startMotionTracking();
            });

            conn.on('close', () => {
                statusText.textContent = "切断されました。";
            });
        };

        // 2. 超高速・フレーム間差分（動体検知）スキャン
        function startMotionTracking() {
            let prevFrameData = null; // 1つ前のフレームのピクセルデータを保存する変数

            function processFrame() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    // 現在の映像をキャンバスに描画
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const currData = frame.data; // 現在のピクセル配列(R,G,B,A, R,G,B,A...)
                    
                    // 最初の1回目は、1つ前のフレームがないので保存だけしてスキップ
                    if (!prevFrameData || prevFrameData.length !== currData.length) {
                        prevFrameData = new Uint8ClampedArray(currData.length);
                        prevFrameData.set(currData);
                        requestAnimationFrame(processFrame);
                        return;
                    }
                    
                    let sumX = 0;
                    let sumY = 0;
                    let count = 0;

                    // 高速化のため、4ピクセルおきにスキャン
                    for (let y = 0; y < canvas.height; y += 4) {
                        for (let x = 0; x < canvas.width; x += 4) {
                            const idx = (y * canvas.width + x) * 4;

                            // 「現在の色」と「1フレーム前の色」の差の絶対値を計算
                            const rDiff = Math.abs(currData[idx] - prevFrameData[idx]);
                            const gDiff = Math.abs(currData[idx+1] - prevFrameData[idx+1]);
                            const bDiff = Math.abs(currData[idx+2] - prevFrameData[idx+2]);

                            // 変化が一定値（閾値）より大きければ「動いた！」とみなす
                            if (rDiff + gDiff + bDiff > 70) { 
                                sumX += x;
                                sumY += y;
                                count++;
                            }
                        }
                    }

                    // 【超重要】ノイズフィルター
                    // 動いたピクセル数が「小さすぎず（ノイズ対策）」「大きすぎない（カメラ手ブレ対策）」場合のみボールと判定
                    // ボールが通ると数十〜数百ピクセルが動くため、この範囲内だけを狙う
                    if (count > 8 && count < 600) {
                        const ballX = sumX / count;
                        const ballY = sumY / count;

                        // iPhoneの画面に検知結果の緑丸を描く
                        ctx.beginPath();
                        ctx.arc(ballX, ballY, 15, 0, 2 * Math.PI);
                        ctx.fillStyle = "#30d158"; // 動体検知は緑色のターゲットマーク
                        ctx.fill();

                        // 座標をPCに送信
                        const ratioX = ballX / canvas.width;
                        const ratioY = ballY / canvas.height;

                        if (conn && conn.open) {
                            conn.send({ x: ratioX, y: ratioY });
                        }
                    }

                    // 次の比較のために、今のピクセルデータを保存
                    prevFrameData.set(currData);
                }
                requestAnimationFrame(processFrame);
            }
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
