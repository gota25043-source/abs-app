<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABS ノイズ極限カット送信機</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 70vh;
            background-color: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #controls {
            padding: 15px;
            height: 30vh;
            box-sizing: border-box;
            background-color: #1a1a1a;
        }
        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
            width: 50%;
            text-align: center;
            margin-right: 8px;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #ff3b30; /* 闘志のレッド */
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
        #status {
            color: #ffcc00;
            margin: 10px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="controls">
        <input type="number" id="pc-id" pattern="[0-9]*" inputmode="numeric" placeholder="4桁のコード">
        <button id="connect-btn">接続</button>
        <p id="status">カメラ起動中...</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        
        let peer = new Peer();
        let conn = null;
        let localStream = null;

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                frameRate: { ideal: 60 }
            },
            audio: false
        })
        .then(stream => {
            video.srcObject = stream;
            localStream = stream;
            video.onloadedmetadata = () => {
                video.play()
                .then(() => { statusText.textContent = "カメラ起動完了。PCに接続してください。"; })
                .catch(err => {
                    statusText.textContent = "画面をタップして再生してください。";
                    document.body.addEventListener('click', () => { video.play(); }, { once: true });
                });
            };
        })
        .catch(err => { alert("カメラ起動失敗: " + err); });

        document.getElementById('connect-btn').onclick = () => {
            const inputNum = document.getElementById('pc-id').value;
            if(!inputNum || inputNum.length !== 4) {
                alert("4桁の数字を入力してください。");
                return;
            }
            const pcId = `abs-${inputNum}`; 
            statusText.textContent = "接続中...";
            
            conn = peer.connect(pcId);
            conn.on('open', () => {
                statusText.textContent = "接続成功！【超強力ノイズカットモード】";
                if (localStream) peer.call(pcId, localStream);
                startAdvancedTracking();
            });
        };

        function startAdvancedTracking() {
            let prevFrameData = null;
            let trackingHistory = [];

            function processFrame() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const currData = frame.data;
                    
                    if (!prevFrameData || prevFrameData.length !== currData.length) {
                        prevFrameData = new Uint8ClampedArray(currData.length);
                        prevFrameData.set(currData);
                        requestAnimationFrame(processFrame);
                        return;
                    }
                    
                    let sumX = 0;
                    let sumY = 0;
                    let ballPixelCount = 0;
                    let totalMovedPixels = 0; // 画面全体で動いた総ピクセル数（ノイズ判定用）

                    // 【対策②】ROI（検知エリア）を画面の中央付近のみに制限
                    // 左右の端15%ずつ、上下の端15%ずつを無視する
                    const minX = Math.floor(canvas.width * 0.15);
                    const maxX = Math.floor(canvas.width * 0.85);
                    const minY = Math.floor(canvas.height * 0.15);
                    const maxY = Math.floor(canvas.height * 0.85);

                    // 高速化スキャン（4px飛ばし）
                    for (let y = 0; y < canvas.height; y += 4) {
                        for (let x = 0; x < canvas.width; x += 4) {
                            const idx = (y * canvas.width + x) * 4;

                            const rDiff = Math.abs(currData[idx] - prevFrameData[idx]);
                            const gDiff = Math.abs(currData[idx+1] - prevFrameData[idx+1]);
                            const bDiff = Math.abs(currData[idx+2] - prevFrameData[idx+2]);

                            // 動き検知の閾値
                            if (rDiff + gDiff + bDiff > 80) {
                                totalMovedPixels++; // 画面のどこであれ、動いたピクセルをすべてカウント

                                // 【対策③】ROIエリア内、かつ「白っぽい（RGBの値がすべて一定以上）」ピクセルのみをボール候補とする
                                if (x >= minX && x <= maxX && y >= minY && y <= maxY) {
                                    const r = currData[idx];
                                    const g = currData[idx+1];
                                    const b = currData[idx+2];
                                    
                                    // 白いボール候補（輝度がそこそこ高いもの）
                                    if (r > 100 && g > 100 && b > 100) {
                                        sumX += x;
                                        sumY += y;
                                        ballPixelCount++;
                                    }
                                }
                            }
                        }
                    }

                    // 画面の全走査ピクセル数の概算
                    const totalScanned = (canvas.width * canvas.height) / 16; 

                    // 【対策①】グローバル・ノイズフィルター
                    // 画面全体の4%以上が同時に動いた場合は「手ブレ」か「光の自動変化」なので、検知を完全に無視！
                    const isCameraShaking = (totalMovedPixels / totalScanned) > 0.04;

                    const now = performance.now();

                    if (!isCameraShaking && ballPixelCount > 4 && ballPixelCount < 400) {
                        const ballX = sumX / ballPixelCount;
                        const ballY = sumY / ballPixelCount;

                        trackingHistory.push({
                            x: ballX,
                            y: ballY,
                            size: ballPixelCount,
                            time: now
                        });

                        if (trackingHistory.length > 8) {
                            trackingHistory.shift();
                        }

                        if (trackingHistory.length >= 3) {
                            const first = trackingHistory[0];
                            const last = trackingHistory[trackingHistory.length - 1];

                            // 「奥から手前に迫ってきているか」
                            const isMovingForward = (last.y - first.y) > 15;
                            const isGrowing = last.size > (first.size * 1.2);
                            const isPitchSpeed = (last.time - first.time) < 250;

                            if (isMovingForward && isGrowing && isPitchSpeed) {
                                // 画面にROIの境界線をうっすら表示（デバッグ用）
                                ctx.strokeStyle = "rgba(0, 255, 255, 0.3)";
                                ctx.lineWidth = 2;
                                ctx.strokeRect(minX, minY, maxX - minX, maxY - minY);

                                // ボールマークを緑に描画
                                ctx.beginPath();
                                ctx.arc(ballX, ballY, 18, 0, 2 * Math.PI);
                                ctx.fillStyle = "#30d158";
                                ctx.fill();

                                const ratioX = ballX / canvas.width;
                                const ratioY = ballY / canvas.height;

                                if (conn && conn.open) {
                                    conn.send({ x: ratioX, y: ratioY });
                                }
                            }
                        }
                    } else {
                        if (trackingHistory.length > 0) trackingHistory.shift();
                    }

                    prevFrameData.set(currData);
                }
                requestAnimationFrame(processFrame);
            }
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
