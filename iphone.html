<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABS スマホ送信端末</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #cam-preview-area {
            position: relative;
            flex-grow: 1;
            background: black;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #ui-overlay {
            padding: 15px;
            background: #1e293b;
            box-sizing: border-box;
            height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
            flex-grow: 1;
            text-align: center;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
        #status-message {
            color: #f59e0b;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            margin: 0;
        }
    </style>
</head>
<body>

    <div id="cam-preview-area">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="motion-canvas"></canvas>
    </div>

    <div id="ui-overlay">
        <p id="status-message">カメラ準備中...</p>
        
        <div class="row">
            <input type="number" id="pc-token" placeholder="PC上の4桁のキーを入力" pattern="[0-9]*" inputmode="numeric">
            <button id="btn-connect">PCへ送信開始</button>
        </div>
        
        <div class="row" style="font-size: 12px; color: #94a3b8;">
            <span>感度設定:</span>
            <input type="range" id="sensitivity-slider" min="40" max="150" value="80" style="flex-grow: 1;">
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('motion-canvas');
        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('status-message');

        let peer = new Peer();
        let dataConn = null;
        let videoStream = null;

        // --- 📱 高速カメラ起動（iOS/Android自動最適化） ---
        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                // 可能であれば最大フレームレート（機種により自動適用）
                frameRate: { ideal: 60, min: 30 },
                width: { ideal: 640 },
                height: { ideal: 480 }
            },
            audio: false
        })
        .then(stream => {
            video.srcObject = stream;
            videoStream = stream;
            video.play();
            statusMsg.textContent = "カメラ起動完了。PCの接続キーを入力してください。";
        })
        .catch(err => {
            statusMsg.textContent = "カメラ起動失敗: " + err;
        });

        // --- 📡 WebRTCによる送信処理 ---
        document.getElementById('btn-connect').onclick = () => {
            const token = document.getElementById('pc-token').value;
            if(!token || token.length !== 4) {
                alert("正しい4桁の数字を入力してください。");
                return;
            }

            const targetId = `abs-master-${token}`;
            statusMsg.textContent = "PCに接続中...";

            // 1. データコネクションを開く（座標送信テスト用）
            dataConn = peer.connect(targetId);
            
            dataConn.on('open', () => {
                statusMsg.textContent = "接続確立！映像を同期しています...";
                statusMsg.style.color = "#10b981";

                // 2. 映像ストリームをPCに発信する
                if (videoStream) {
                    peer.call(targetId, videoStream);
                }

                // 3. 軌道追跡アルゴリズムを起動
                startDetectionEngine();
            });

            dataConn.on('close', () => {
                statusMsg.textContent = "PC接続が切断されました。";
                statusMsg.style.color = "#f43f5e";
            });
        };

        // --- ⚽ 完全自動・軌道ベクトル検知（バグ弾きフィルター） ---
        function startDetectionEngine() {
            let lastFrameData = null;
            let trajectoryStack = []; // [ {x, y, size, t}, ... ]

            function processVideoFrame() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const currentPixels = frame.data;

                    if (!lastFrameData || lastFrameData.length !== currentPixels.length) {
                        lastFrameData = new Uint8ClampedArray(currentPixels.length);
                        lastFrameData.set(currentPixels);
                        requestAnimationFrame(processVideoFrame);
                        return;
                    }

                    // 1. 前フレームとのフレーム間差分を計算
                    let weightX = 0;
                    let weightY = 0;
                    let motionCount = 0;

                    // スマホ画面の端っこ10%はノイズカットゾーン(ROI)とする
                    const minX = Math.floor(canvas.width * 0.1);
                    const maxX = Math.floor(canvas.width * 0.9);
                    const minY = Math.floor(canvas.height * 0.1);
                    const maxY = Math.floor(canvas.height * 0.9);

                    const diffThreshold = parseInt(document.getElementById('sensitivity-slider').value);

                    for (let y = 0; y < canvas.height; y += 4) { // 4px間隔で超高速スキャン
                        for (let x = 0; x < canvas.width; x += 4) {
                            const idx = (y * canvas.width + x) * 4;

                            const rDiff = Math.abs(currentPixels[idx] - lastFrameData[idx]);
                            const gDiff = Math.abs(currentPixels[idx+1] - lastFrameData[idx+1]);
                            const bDiff = Math.abs(currentPixels[idx+2] - lastFrameData[idx+2]);

                            if (rDiff + gDiff + bDiff > diffThreshold) {
                                if (x >= minX && x <= maxX && y >= minY && y <= maxY) {
                                    weightX += x;
                                    weightY += y;
                                    motionCount++;
                                }
                            }
                        }
                    }

                    const timeNow = performance.now();

                    // 動体（ボールらしきもの）のサイズ制限 (小さすぎず、大きすぎない)
                    if (motionCount > 5 && motionCount < 600) {
                        const bX = weightX / motionCount;
                        const bY = weightY / motionCount;

                        trajectoryStack.push({ x: bX, y: bY, size: motionCount, t: timeNow });

                        // 直近5フレームの移動履歴を保持
                        if (trajectoryStack.length > 5) trajectoryStack.shift();

                        // --- 🚀 ベクトル物理特性フィルター ---
                        if (trajectoryStack.length >= 3) {
                            const p1 = trajectoryStack[trajectoryStack.length - 3];
                            const p2 = trajectoryStack[trajectoryStack.length - 2];
                            const p3 = trajectoryStack[trajectoryStack.length - 1];

                            // 進むベクトルの方向（矢印）を計算
                            const v1x = p2.x - p1.x;
                            const v1y = p2.y - p1.y;
                            const v2x = p3.x - p2.x;
                            const v2y = p3.y - p2.y;

                            const d1 = Math.sqrt(v1x*v1x + v1y*v1y);
                            const d2 = Math.sqrt(v2x*v2x + v2y*v2y);

                            // バグチェック①: テレポート、極端な急停止を排除
                            const hasValidPhysics = (d1 > 4 && d1 < 120) && (d2 > 4 && d2 < 120);

                            if (hasValidPhysics && d1 > 0 && d2 > 0) {
                                // 2つの矢印のなす角をコサイン類似度で算出 (直進性を担保)
                                const dot = v1x*v2x + v1y*v2y;
                                const cosTheta = dot / (d1 * d2);

                                // バグチェック②: コサイン類似度が0.85以上（ブレ角が30度未満の一本の軌道）
                                // かつ、野球のボールなので基本「重力で下方向に沈む(yがプラス)」
                                if (cosTheta > 0.85 && v2y > 2) {
                                    
                                    // 画面上に緑サークルを描画（スマホ単体で検知中であることを視覚フィードバック）
                                    ctx.beginPath();
                                    ctx.arc(p3.x, p3.y, 20, 0, 2 * Math.PI);
                                    ctx.fillStyle = "#10b981";
                                    ctx.fill();

                                    // PCサーバーに正規化された座標(0.0 〜 1.0)を送信！
                                    const normU = p3.x / canvas.width;
                                    const normV = p3.y / canvas.height;

                                    if (dataConn && dataConn.open) {
                                        dataConn.send({ u: normU, v: normV });
                                    }
                                }
                            }
                        }
                    } else {
                        // 動きが消失した場合は履歴を忘れる
                        if (trajectoryStack.length > 0) trajectoryStack.shift();
                    }

                    lastFrameData.set(currentPixels);
                }
                requestAnimationFrame(processVideoFrame);
            }
            requestAnimationFrame(processVideoFrame);
        }
    </script>
</body>
</html>
