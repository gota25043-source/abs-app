<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABS スマホ送信端末</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #cam-preview-area {
            position: relative;
            flex-grow: 1;
            background: black;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; /* 画面サイズと座標系の完全一致 */
        }
        #ui-overlay {
            padding: 15px;
            background: #1e293b;
            box-sizing: border-box;
            height: 30vh;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        select, input {
            padding: 10px;
            font-size: 15px;
            background: #0f172a;
            border: 1px solid #475569;
            color: white;
            border-radius: 6px;
        }
        input[type="number"] {
            flex-grow: 1;
            text-align: center;
        }
        button {
            padding: 12px 20px;
            font-size: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }
        #status-message {
            color: #f59e0b;
            font-weight: bold;
            font-size: 13px;
            text-align: center;
            margin: 0;
        }
        #play-mask {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            z-index: 99;
        }
    </style>
</head>
<body>

    <div id="cam-preview-area">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="motion-canvas"></canvas>
        <div id="play-mask" style="display: none;">画面をタップしてカメラ起動</div>
    </div>

    <div id="ui-overlay">
        <p id="status-message">カメラ初期化中...</p>
        
        <div class="row">
            <select id="cam-id-select">
                <option value="1">CAM 1 (真後ろ)</option>
                <option value="2">CAM 2 (一塁側)</option>
                <option value="3">CAM 3 (三塁側)</option>
            </select>
            <input type="number" id="pc-token" placeholder="PCの4桁キー" pattern="[0-9]*" inputmode="numeric">
        </div>
        
        <button id="btn-connect" style="width: 100%;">PCへ接続・送信開始</button>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('motion-canvas');
        const ctx = canvas.getContext('2d');
        const statusMsg = document.getElementById('status-message');
        const playMask = document.getElementById('play-mask');

        let peer = new Peer();
        let dataConn = null;
        let videoStream = null;
        let isEngineRunning = false;

        function initCamera() {
            navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', frameRate: { ideal: 60 } },
                audio: false
            })
            .then(stream => {
                videoStream = stream;
                video.srcObject = stream;
                video.play().then(() => {
                    statusMsg.textContent = "カメラ準備完了。PCキーを入力してください。";
                    playMask.style.display = 'none';
                }).catch(() => {
                    playMask.style.display = 'flex';
                });
            })
            .catch(err => {
                statusMsg.textContent = "カメラアクセスエラー: 権限を確認してください";
            });
        }

        playMask.addEventListener('click', () => {
            video.play();
            playMask.style.display = 'none';
            statusMsg.textContent = "カメラ準備完了。PCキーを入力してください。";
        });

        initCamera();

        document.getElementById('btn-connect').onclick = () => {
            const token = document.getElementById('pc-token').value;
            const selectedCamId = parseInt(document.getElementById('cam-id-select').value);

            if(!token || token.length !== 4) {
                alert("PC画面上の4桁の数字を入力してください。");
                return;
            }

            const targetId = `abs-master-${token}`;
            statusMsg.textContent = `PCに接続中...`;

            try {
                dataConn = peer.connect(targetId, { metadata: { camId: selectedCamId } });
                
                dataConn.on('open', () => {
                    statusMsg.textContent = `CAM ${selectedCamId} 接続成功！測定中...`;
                    statusMsg.style.color = "#10b981";

                    if (videoStream) {
                        peer.call(targetId, videoStream, { metadata: { camId: selectedCamId } });
                    }

                    if (!isEngineRunning) startDetectionEngine();
                });

                dataConn.on('error', () => {
                    statusMsg.textContent = "接続エラー: PCキーを再確認してください";
                    statusMsg.style.color = "#ef4444";
                });
            } catch(e) {
                statusMsg.textContent = "接続設定エラー";
            }
        };

        // 🛡️ 高速・軽量化 動体検知エンジン（防弾仕様）
        function startDetectionEngine() {
            isEngineRunning = true;
            let lastFrameData = null;
            let history = [];

            const PROC_W = 320;
            const PROC_H = 240;

            function processFrame() {
                try {
                    if (video.readyState === video.HAVE_ENOUGH_DATA) {
                        if (canvas.width !== PROC_W) {
                            canvas.width = PROC_W;
                            canvas.height = PROC_H;
                        }

                        ctx.drawImage(video, 0, 0, PROC_W, PROC_H);
                        const frame = ctx.getImageData(0, 0, PROC_W, PROC_H);
                        const curr = frame.data;

                        if (lastFrameData && lastFrameData.length === curr.length) {
                            let sumX = 0, sumY = 0, count = 0;

                            for (let y = 10; y < PROC_H - 10; y += 3) {
                                for (let x = 10; x < PROC_W - 10; x += 3) {
                                    const idx = (y * PROC_W + x) * 4;
                                    const diff = Math.abs(curr[idx] - lastFrameData[idx]) +
                                                 Math.abs(curr[idx+1] - lastFrameData[idx+1]) +
                                                 Math.abs(curr[idx+2] - lastFrameData[idx+2]);

                                    if (diff > 90) {
                                        sumX += x; sumY += y; count++;
                                    }
                                }
                            }

                            // ノイズ（手振れ・影）弾きフィルタ: 3〜120ピクセル範囲のまとまりのみボールと判別
                            if (count >= 3 && count <= 120) {
                                const avgX = sumX / count;
                                const avgY = sumY / count;

                                history.push({ x: avgX, y: avgY, t: performance.now() });
                                if (history.length > 4) history.shift();

                                if (history.length >= 3) {
                                    const p1 = history[history.length - 3];
                                    const p2 = history[history.length - 2];
                                    const p3 = history[history.length - 1];

                                    const dx1 = p2.x - p1.x, dy1 = p2.y - p1.y;
                                    const dx2 = p3.x - p2.x, dy2 = p3.y - p2.y;
                                    const dist1 = Math.sqrt(dx1*dx1 + dy1*dy1);
                                    const dist2 = Math.sqrt(dx2*dx2 + dy2*dy2);

                                    // 直線移動チェック（ノイズのランダムな跳ねを除外）
                                    if (dist1 > 2 && dist2 > 2) {
                                        const dot = (dx1*dx2 + dy1*dy2) / (dist1 * dist2);
                                        if (dot > 0.75) {
                                            ctx.beginPath();
                                            ctx.arc(p3.x, p3.y, 8, 0, 2 * Math.PI);
                                            ctx.fillStyle = "#10b981";
                                            ctx.fill();

                                            if (dataConn && dataConn.open) {
                                                dataConn.send({
                                                    u: p3.x / PROC_W,
                                                    v: p3.y / PROC_H
                                                });
                                            }
                                        }
                                    }
                                }
                            } else {
                                if (history.length > 0) history.shift();
                            }
                        }

                        if (!lastFrameData || lastFrameData.length !== curr.length) {
                            lastFrameData = new Uint8ClampedArray(curr.length);
                        }
                        lastFrameData.set(curr);
                    }
                } catch(e) {
                    // ループ中の例外で停止させない
                }
                requestAnimationFrame(processFrame);
            }
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
