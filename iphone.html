<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABS 完全自動・軌道一貫性フィルタ</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            text-align: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }
        #container {
            position: relative;
            width: 100vw;
            height: 70vh;
            background-color: #000;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        #controls {
            padding: 15px;
            height: 30vh;
            box-sizing: border-box;
            background-color: #1a1a1a;
        }
        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #333;
            color: white;
            width: 50%;
            text-align: center;
            margin-right: 8px;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            background-color: #30d158;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
        }
        #status {
            color: #ffcc00;
            margin: 10px 0;
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="container">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
    </div>

    <div id="controls">
        <input type="number" id="pc-id" pattern="[0-9]*" inputmode="numeric" placeholder="4桁のコード">
        <button id="connect-btn">接続</button>
        <p id="status">カメラ起動中...</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');
        
        let peer = new Peer();
        let conn = null;
        let localStream = null;

        navigator.mediaDevices.getUserMedia({
            video: {
                facingMode: 'environment',
                frameRate: { ideal: 60 }
            },
            audio: false
        })
        .then(stream => {
            video.srcObject = stream;
            localStream = stream;
            video.onloadedmetadata = () => {
                video.play()
                .then(() => { statusText.textContent = "カメラ起動完了。PCと接続してください。"; })
                .catch(err => {
                    statusText.textContent = "タップして再生してください。";
                    document.body.addEventListener('click', () => { video.play(); }, { once: true });
                });
            };
        })
        .catch(err => { alert("カメラ起動失敗: " + err); });

        document.getElementById('connect-btn').onclick = () => {
            const inputNum = document.getElementById('pc-id').value;
            if(!inputNum || inputNum.length !== 4) {
                alert("4桁の数字を入力してください。");
                return;
            }
            const pcId = `abs-${inputNum}`; 
            statusText.textContent = "接続中...";
            
            conn = peer.connect(pcId);
            conn.on('open', () => {
                statusText.textContent = "接続成功！【全自動・軌道ベクトル判定モード】";
                statusText.style.color = "#30d158";
                if (localStream) peer.call(pcId, localStream);
                startVectorTracking();
            });
        };

        function startVectorTracking() {
            let prevFrameData = null;
            let trackingHistory = []; // 過去数フレームのボール候補座標をストック

            function processFrame() {
                if (video.readyState === video.HAVE_ENOUGH_DATA) {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const currData = frame.data;
                    
                    if (!prevFrameData || prevFrameData.length !== currData.length) {
                        prevFrameData = new Uint8ClampedArray(currData.length);
                        prevFrameData.set(currData);
                        requestAnimationFrame(processFrame);
                        return;
                    }
                    
                    let sumX = 0;
                    let sumY = 0;
                    let ballPixelCount = 0;

                    // ROI（画面の上下左右の端15%を除外して無駄な動きをカット）
                    const minX = Math.floor(canvas.width * 0.15);
                    const maxX = Math.floor(canvas.width * 0.85);
                    const minY = Math.floor(canvas.height * 0.15);
                    const maxY = Math.floor(canvas.height * 0.85);

                    // 4px飛ばしで高速スキャン
                    for (let y = 0; y < canvas.height; y += 4) {
                        for (let x = 0; x < canvas.width; x += 4) {
                            const idx = (y * canvas.width + x) * 4;

                            const rDiff = Math.abs(currData[idx] - prevFrameData[idx]);
                            const gDiff = Math.abs(currData[idx+1] - prevFrameData[idx+1]);
                            const bDiff = Math.abs(currData[idx+2] - prevFrameData[idx+2]);

                            // 一定以上の色変化があり、かつROI（中央エリア）の中だけを見る
                            if (rDiff + gDiff + bDiff > 80) {
                                if (x >= minX && x <= maxX && y >= minY && y <= maxY) {
                                    sumX += x;
                                    sumY += y;
                                    ballPixelCount++;
                                }
                            }
                        }
                    }

                    const now = performance.now();

                    // 動いたサイズがボールとして適切な場合（小さすぎず大きすぎず）
                    if (ballPixelCount > 6 && ballPixelCount < 500) {
                        const ballX = sumX / ballPixelCount;
                        const ballY = sumY / ballPixelCount;

                        trackingHistory.push({ x: ballX, y: ballY, size: ballPixelCount, time: now });

                        // 過去5フレーム分をキープ
                        if (trackingHistory.length > 5) {
                            trackingHistory.shift();
                        }

                        // --- 🚀 【核心】軌道のベクトル検証アルゴリズム ---
                        if (trackingHistory.length >= 3) {
                            const p1 = trackingHistory[trackingHistory.length - 3];
                            const p2 = trackingHistory[trackingHistory.length - 2];
                            const p3 = trackingHistory[trackingHistory.length - 1];

                            // 1. ベクトル（進む向きと量）を計算
                            const v1x = p2.x - p1.x;
                            const v1y = p2.y - p1.y;
                            const v2x = p3.x - p2.x;
                            const v2y = p3.y - p2.y;

                            // 2. それぞれのベクトルの長さ（移動距離）を計算
                            const len1 = Math.sqrt(v1x * v1x + v1y * v1y);
                            const len2 = Math.sqrt(v2x * v2x + v2y * v2y);

                            // 【物理フィルタ1：テレポート（ワープ）防止】
                            // 1フレームで進む距離が不自然に「短すぎる」または「長すぎる」ノイズを弾く
                            const isSpeedValid = (len1 > 5 && len1 < 100) && (len2 > 5 && len2 < 100);

                            if (isSpeedValid && len1 > 0 && len2 > 0) {
                                // 3. 内積を使って2つのベクトルのなす角（コサイン類似度）を算出
                                const dotProduct = v1x * v2x + v1y * v2y;
                                const cosTheta = dotProduct / (len1 * len2);

                                // 【物理フィルタ2：方向の一貫性】
                                // cos(θ) が 0.85 以上 ＝ 進む方向のズレが約30度以内のなめらかな直線の時だけボールとみなす！
                                // さらに野球の投球なので「基本的には下方向（yが増える方向）に進んでいる」こと
                                const isSmoothStraight = cosTheta > 0.85;
                                const isMovingDown = v2y > 2; // 下方向へ進んでいるか

                                if (isSmoothStraight && isMovingDown) {
                                    // 画面に「あきらかなボール」として認識した緑マークを描画
                                    ctx.beginPath();
                                    ctx.arc(p3.x, p3.y, 20, 0, 2 * Math.PI);
                                    ctx.fillStyle = "#30d158";
                                    ctx.fill();

                                    // PC側へ本物の座標を送信
                                    const ratioX = p3.x / canvas.width;
                                    const ratioY = p3.y / canvas.height;

                                    if (conn && conn.open) {
                                        conn.send({ x: ratioX, y: ratioY });
                                    }
                                }
                            }
                        }
                    } else {
                        // 動きが消えたらゆっくり履歴を忘れる
                        if (trackingHistory.length > 0) trackingHistory.shift();
                    }

                    prevFrameData.set(currData);
                }
                requestAnimationFrame(processFrame);
            }
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
