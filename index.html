<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Hawk-Eye DIY: 完全防弾版 3D投球判定システム</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #0b0f19;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            height: 96vh;
            gap: 15px;
            overflow: hidden;
        }
        #left-panel {
            width: 350px;
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #center-panel {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        #right-panel {
            width: 400px;
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        h2 {
            margin: 0;
            font-size: 15px;
            color: #38bdf8;
            border-left: 4px solid #38bdf8;
            padding-left: 8px;
            text-transform: uppercase;
        }
        .card {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid #334155;
        }
        #camera-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            flex-grow: 1;
        }
        .camera-container {
            background: #0f172a;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            border: 2px solid #334155;
            aspect-ratio: 4/3;
        }
        .camera-container.active {
            border-color: #10b981;
        }
        .camera-video {
            width: 100%;
            height: 100%;
            object-fit: fill; /* 画面サイズと座標系の完全一致 */
        }
        .camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 10;
        }
        .cam-label {
            position: absolute;
            top: 5px;
            left: 5px;
            background: rgba(0,0,0,0.75);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            z-index: 20;
        }
        .calib-dot {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #f43f5e;
            border: 2px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            pointer-events: none;
        }
        .calib-dot-label {
            position: absolute;
            color: #f43f5e;
            font-size: 11px;
            font-weight: bold;
            transform: translate(8px, -15px);
            text-shadow: 0 0 4px black;
            z-index: 16;
            pointer-events: none;
        }
        .chart-container {
            flex-grow: 1;
            background: #0f172a;
            border-radius: 8px;
            position: relative;
            border: 1px solid #334155;
        }
        .chart-svg {
            width: 100%;
            height: 100%;
        }
        #metric-board {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .metric-value {
            font-size: 42px;
            font-weight: 900;
            text-align: center;
            font-family: 'Impact', sans-serif;
        }
        .metric-title {
            font-size: 11px;
            color: #94a3b8;
            text-align: center;
            text-transform: uppercase;
        }
        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }
        .btn:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover { background: #dc2626; }
        .btn-success { background: #10b981; }
        .btn-success:hover { background: #059669; }
    </style>
</head>
<body>

    <div id="left-panel">
        <div class="card">
            <h2>① システム接続キー</h2>
            <div style="font-size: 28px; font-weight: bold; text-align: center; color: #f59e0b; margin: 8px 0;" id="master-id">----</div>
            <div style="font-size: 11px; color: #94a3b8; text-align: center;">スマホ側にこの4桁を入力して接続</div>
        </div>

        <div class="card" style="display: flex; flex-direction: column; gap: 8px;">
            <h2>② 空間初期設定 (DLT)</h2>
            <div style="font-size: 11px; color: #cbd5e1;">画面のカメラをタップして6点の設定を行ってください。</div>
            
            <select id="active-cam-select" style="padding: 6px; background: #334155; color: white; border: none; border-radius: 4px;">
                <option value="1">カメラ 1 (マウンド真後ろ)</option>
                <option value="2">カメラ 2 (一塁側斜め前)</option>
                <option value="3">カメラ 3 (三塁側斜め前)</option>
            </select>

            <div id="calib-points-status" style="font-size: 11px; margin-top: 2px;"></div>
            
            <button class="btn btn-success" id="calc-dlt-btn" style="margin-top: 4px;">カメラ行列を確定・保存</button>
        </div>

        <div class="card">
            <h2>③ ストライクゾーン設定 (m)</h2>
            <div style="display: flex; gap: 10px; margin-top: 8px;">
                <div>
                    <label style="font-size: 11px; color: #94a3b8;">低め (膝)</label>
                    <input type="number" id="sz-low" value="0.5" step="0.05" style="width: 100%; padding: 5px; background: #334155; border: none; color: white; border-radius: 4px;">
                </div>
                <div>
                    <label style="font-size: 11px; color: #94a3b8;">高め (胸)</label>
                    <input type="number" id="sz-high" value="1.1" step="0.05" style="width: 100%; padding: 5px; background: #334155; border: none; color: white; border-radius: 4px;">
                </div>
            </div>
        </div>
        
        <button class="btn btn-danger" id="clear-data-btn">測定履歴リセット</button>
    </div>

    <div id="center-panel">
        <div id="camera-grid">
            <div class="camera-container" id="cam-container-1">
                <span class="cam-label" style="color: #60a5fa;">CAM 1 (真後ろ)</span>
                <video class="camera-video" id="video-1" autoplay playsinline muted></video>
                <div class="camera-overlay" id="overlay-1"></div>
            </div>
            <div class="camera-container" id="cam-container-2">
                <span class="cam-label" style="color: #34d399;">CAM 2 (一塁側)</span>
                <video class="camera-video" id="video-2" autoplay playsinline muted></video>
                <div class="camera-overlay" id="overlay-2"></div>
            </div>
            <div class="camera-container" id="cam-container-3">
                <span class="cam-label" style="color: #a78bfa;">CAM 3 (三塁側)</span>
                <video class="camera-video" id="video-3" autoplay playsinline muted></video>
                <div class="camera-overlay" id="overlay-3"></div>
            </div>
        </div>

        <div id="metric-board">
            <div>
                <div class="metric-value" id="result-text" style="color: #64748b;">READY</div>
                <div class="metric-title">JUDGEMENT</div>
            </div>
            <div>
                <div class="metric-value" id="speed-text" style="color: #38bdf8;">-- <span style="font-size: 18px;">km/h</span></div>
                <div class="metric-title">PITCH SPEED</div>
            </div>
            <div>
                <div class="metric-value" id="accuracy-text" style="color: #a8a29e;">-- <span style="font-size: 18px;">mm</span></div>
                <div class="metric-title">3D ERROR</div>
            </div>
        </div>
    </div>

    <div id="right-panel">
        <div class="chart-container">
            <span class="cam-label" style="background: rgba(15,23,42,0.9);">正面図 (Strike Zone)</span>
            <svg class="chart-svg" id="svg-front" viewBox="-0.8 -0.2 1.6 1.8"></svg>
        </div>
        <div class="chart-container">
            <span class="cam-label" style="background: rgba(15,23,42,0.9);">平面図 (XZ 軌道真上)</span>
            <svg class="chart-svg" id="svg-top" viewBox="-1.5 -1 3 20"></svg>
        </div>
        <div class="chart-container">
            <span class="cam-label" style="background: rgba(15,23,42,0.9);">側面図 (YZ 軌道真横)</span>
            <svg class="chart-svg" id="svg-side" viewBox="-1 -0.2 20 2.2"></svg>
        </div>
    </div>

    <script>
        // 基準座標データ
        const CALIB_3D_POINTS = [
            { X: -0.216, Y: 0.0, Z: 0.0 },
            { X: 0.216,  Y: 0.0, Z: 0.0 },
            { X: -0.71,  Y: 0.0, Z: 0.91 },
            { X: 0.71,   Y: 0.0, Z: 0.91 },
            { X: 0.0,    Y: 1.0, Z: 0.0 },
            { X: 0.71,   Y: 1.0, Z: 0.91 }
        ];

        const POINT_NAMES = [
            "P1: ホーム左角 (地面)",
            "P2: ホーム右角 (地面)",
            "P3: 左打席前角 (地面)",
            "P4: 右打席前角 (地面)",
            "P5: ホーム中心棒天辺 (高さ1m)",
            "P6: 右打席角棒天辺 (高さ1m)"
        ];

        let myId = Math.floor(1000 + Math.random() * 9000);
        const peer = new Peer(`abs-master-${myId}`);
        let connections = {};
        let peerToCamMap = {};
        
        let clickedCoords = { 1: [], 2: [], 3: [] };
        let activePointIdx = 0;
        let cameraMatrices = { 1: null, 2: null, 3: null };
        let detectionQueues = { 1: [], 2: [], 3: [] };
        let trajectory3D = [];
        let lastTriangulatedTime = 0;

        peer.on('open', (id) => {
            document.getElementById('master-id').textContent = myId;
            console.log('Master System Ready. ID:', id);
        });

        peer.on('connection', (conn) => {
            const camId = (conn.metadata && conn.metadata.camId) ? conn.metadata.camId : (Object.keys(connections).length + 1);
            connections[camId] = conn;
            peerToCamMap[conn.peer] = camId;

            conn.on('data', (data) => {
                try {
                    if (data && typeof data.u === 'number' && typeof data.v === 'number') {
                        detectionQueues[camId].push({
                            u: data.u,
                            v: data.v,
                            t: performance.now()
                        });
                        if (detectionQueues[camId].length > 30) detectionQueues[camId].shift();
                    }
                } catch (e) {
                    // 通信パケットエラー自動無視
                }
            });

            conn.on('close', () => {
                delete connections[camId];
                delete peerToCamMap[conn.peer];
                document.getElementById(`cam-container-${camId}`).classList.remove('active');
                cameraMatrices[camId] = null;
            });
        });

        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                let camId = (call.metadata && call.metadata.camId) ? call.metadata.camId : peerToCamMap[call.peer];
                if (!camId) camId = 1;

                const videoEl = document.getElementById(`video-${camId}`);
                if (videoEl) {
                    videoEl.srcObject = remoteStream;
                    videoEl.play().catch(() => {});
                    document.getElementById(`cam-container-${camId}`).classList.add('active');
                }
            });
        });

        function renderPointStatus() {
            const container = document.getElementById('calib-points-status');
            container.innerHTML = "";
            const activeCam = document.getElementById('active-cam-select').value;
            const currentPoints = clickedCoords[activeCam];

            POINT_NAMES.forEach((name, idx) => {
                const div = document.createElement('div');
                div.style.padding = "3px";
                div.style.borderRadius = "3px";
                div.style.marginBottom = "2px";
                
                if (idx === activePointIdx) {
                    div.style.background = "#2563eb";
                    div.style.color = "white";
                    div.style.fontWeight = "bold";
                } else if (currentPoints && currentPoints[idx]) {
                    div.style.color = "#10b981";
                    div.textContent = `✓ ${name}`;
                    container.appendChild(div);
                    return;
                } else {
                    div.style.color = "#64748b";
                }
                div.textContent = `${idx + 1}. ${name}`;
                container.appendChild(div);
            });
        }

        document.getElementById('active-cam-select').addEventListener('change', () => {
            activePointIdx = 0;
            renderPointStatus();
            redrawOverlayPoints();
        });

        [1, 2, 3].forEach(camId => {
            const overlay = document.getElementById(`overlay-${camId}`);
            overlay.addEventListener('click', (e) => {
                const selectedCam = parseInt(document.getElementById('active-cam-select').value);
                if (selectedCam !== camId) return;

                const rect = overlay.getBoundingClientRect();
                const u = (e.clientX - rect.left) / rect.width;
                const v = (e.clientY - rect.top) / rect.height;

                clickedCoords[camId][activePointIdx] = { u, v };
                activePointIdx = (activePointIdx < 5) ? activePointIdx + 1 : 0;
                
                renderPointStatus();
                redrawOverlayPoints();
            });
        });

        function redrawOverlayPoints() {
            [1, 2, 3].forEach(camId => {
                const overlay = document.getElementById(`overlay-${camId}`);
                overlay.querySelectorAll('.calib-dot, .calib-dot-label').forEach(el => el.remove());

                if (clickedCoords[camId]) {
                    clickedCoords[camId].forEach((pt, idx) => {
                        const dot = document.createElement('div');
                        dot.className = 'calib-dot';
                        dot.style.left = `${pt.u * 100}%`;
                        dot.style.top = `${pt.v * 100}%`;

                        const label = document.createElement('div');
                        label.className = 'calib-dot-label';
                        label.style.left = `${pt.u * 100}%`;
                        label.style.top = `${pt.v * 100}%`;
                        label.textContent = `P${idx+1}`;

                        overlay.appendChild(dot);
                        overlay.appendChild(label);
                    });
                }
            });
        }

        renderPointStatus();

        // 🛡️ DLT計算（防弾仕様）
        document.getElementById('calc-dlt-btn').onclick = () => {
            const activeCam = document.getElementById('active-cam-select').value;
            const pts = clickedCoords[activeCam];

            if (!pts || pts.length < 6) {
                alert("6箇所の基準点をすべて画面上でタップしてください。");
                return;
            }

            try {
                let A = [], B = [];
                for (let i = 0; i < 6; i++) {
                    let p3d = CALIB_3D_POINTS[i];
                    let p2d = pts[i];
                    let X = p3d.X, Y = p3d.Y, Z = p3d.Z;
                    let u = p2d.u, v = p2d.v;

                    A.push([X, Y, Z, 1, 0, 0, 0, 0, -u*X, -u*Y, -u*Z]);
                    B.push(u);
                    A.push([0, 0, 0, 0, X, Y, Z, 1, -v*X, -v*Y, -v*Z]);
                    B.push(v);
                }

                let w = solveLeastSquaresNormal(A, B);
                if (!w || w.some(isNaN)) throw new Error("Invalid matrix result");

                cameraMatrices[activeCam] = [
                    w[0], w[1], w[2], w[3],
                    w[4], w[5], w[6], w[7],
                    w[8], w[9], w[10], 1.0
                ];

                alert(`カメラ ${activeCam} の設定が完了しました！`);
                document.getElementById(`cam-container-${activeCam}`).style.borderColor = "#10b981";
            } catch (err) {
                alert("位置の計算に失敗しました。タップした位置が正しくない可能性があります。やり直してください。");
            }
        };

        function solveLeastSquaresNormal(A, B) {
            try {
                let rows = A.length, cols = A[0].length;
                let AtA = Array.from({length: cols}, () => new Array(cols).fill(0));
                let AtB = new Array(cols).fill(0);

                for (let r = 0; r < rows; r++) {
                    for (let i = 0; i < cols; i++) {
                        for (let j = 0; j < cols; j++) {
                            AtA[i][j] += A[r][i] * A[r][j];
                        }
                        AtB[i] += A[r][i] * B[r];
                    }
                }
                return solveLinearSystem(AtA, AtB);
            } catch (e) {
                return null;
            }
        }

        function solveLinearSystem(A_in, B_in) {
            let n = B_in.length;
            let A = A_in.map(row => [...row]);
            let B = [...B_in];

            for (let i = 0; i < n; i++) {
                let maxEl = Math.abs(A[i][i]), maxRow = i;
                for (let k = i + 1; k < n; k++) {
                    if (Math.abs(A[k][i]) > maxEl) {
                        maxEl = Math.abs(A[k][i]);
                        maxRow = k;
                    }
                }
                let tmpA = A[maxRow]; A[maxRow] = A[i]; A[i] = tmpA;
                let tmpB = B[maxRow]; B[maxRow] = B[i]; B[i] = tmpB;

                if (Math.abs(A[i][i]) < 1e-12) return null;

                for (let k = i + 1; k < n; k++) {
                    let c = A[k][i] / A[i][i];
                    for (let j = i; j < n; j++) A[k][j] -= c * A[i][j];
                    B[k] -= c * B[i];
                }
            }
            let x = new Array(n).fill(0);
            for (let i = n - 1; i >= 0; i--) {
                let sum = 0;
                for (let k = i + 1; k < n; k++) sum += A[i][k] * x[k];
                x[i] = (B[i] - sum) / A[i][i];
            }
            return x;
        }

        // 🛡️ メイン3D演算ループ（防弾仕様）
        function triangulationLoop() {
            try {
                const calibratedCamIds = [1, 2, 3].filter(id => cameraMatrices[id] !== null);
                if (calibratedCamIds.length >= 2) {
                    let triggerCamId = calibratedCamIds.includes(1) ? 1 : calibratedCamIds[0];
                    const triggerQueue = detectionQueues[triggerCamId];

                    if (triggerQueue && triggerQueue.length > 0) {
                        const latestObs = triggerQueue[triggerQueue.length - 1];
                        
                        if (latestObs.t !== lastTriangulatedTime) {
                            lastTriangulatedTime = latestObs.t;
                            const targetTime = latestObs.t;

                            let synchronizedObs = {};
                            synchronizedObs[triggerCamId] = { u: latestObs.u, v: latestObs.v };

                            for (let camId of calibratedCamIds) {
                                if (camId === triggerCamId) continue;
                                const q = detectionQueues[camId];
                                if (!q || q.length < 2) continue;

                                let before = null, after = null;
                                for (let i = q.length - 1; i >= 0; i--) {
                                    if (q[i].t <= targetTime) { before = q[i]; break; }
                                }
                                for (let i = 0; i < q.length; i++) {
                                    if (q[i].t >= targetTime) { after = q[i]; break; }
                                }

                                if (before && after && (after.t - before.t) < 120) {
                                    const duration = after.t - before.t;
                                    const factor = duration === 0 ? 0.5 : (targetTime - before.t) / duration;
                                    synchronizedObs[camId] = {
                                        u: before.u + factor * (after.u - before.u),
                                        v: before.v + factor * (after.v - before.v)
                                    };
                                }
                            }

                            const syncedIds = Object.keys(synchronizedObs).map(Number);
                            if (syncedIds.length >= 2) {
                                let A_tri = [], B_tri = [];
                                syncedIds.forEach(id => {
                                    const M = cameraMatrices[id];
                                    const obs = synchronizedObs[id];
                                    A_tri.push([ obs.u*M[8] - M[0],  obs.u*M[9] - M[1],  obs.u*M[10] - M[2] ]);
                                    B_tri.push( M[3] - obs.u );
                                    A_tri.push([ obs.v*M[8] - M[4],  obs.v*M[9] - M[5],  obs.v*M[10] - M[6] ]);
                                    B_tri.push( M[7] - obs.v );
                                });

                                const p3D = solveLeastSquares3D(A_tri, B_tri);
                                if (p3D && !p3D.some(isNaN)) {
                                    const [X, Y, Z] = p3D;
                                    if (Math.abs(X) < 5 && Y > -1 && Y < 4 && Z > -2 && Z < 25) {
                                        trajectory3D.push({ X, Y, Z, t: targetTime });
                                        if (trajectory3D.length > 50) trajectory3D.shift();
                                        updatePlots();
                                        analyzePitchMetrics();
                                    }
                                }
                            }
                        }
                    }
                }
            } catch (err) {
                // 万が一演算エラーが起きてもルーティンを壊さず維持
            }
            requestAnimationFrame(triangulationLoop);
        }

        function solveLeastSquares3D(A, B) {
            try {
                let C = [[0,0,0],[0,0,0],[0,0,0]], D = [0,0,0], rows = A.length;
                for (let r = 0; r < rows; r++) {
                    for (let i = 0; i < 3; i++) {
                        for (let j = 0; j < 3; j++) C[i][j] += A[r][i] * A[r][j];
                        D[i] += A[r][i] * B[r];
                    }
                }
                let det = C[0][0]*(C[1][1]*C[2][2] - C[1][2]*C[2][1]) -
                          C[0][1]*(C[1][0]*C[2][2] - C[1][2]*C[2][0]) +
                          C[0][2]*(C[1][0]*C[2][1] - C[1][1]*C[2][0]);

                if (Math.abs(det) < 1e-10) return null;

                let detX = D[0]*(C[1][1]*C[2][2] - C[1][2]*C[2][1]) - C[0][1]*(D[1]*C[2][2] - C[1][2]*D[2]) + C[0][2]*(D[1]*C[2][1] - C[1][1]*D[2]);
                let detY = C[0][0]*(D[1]*C[2][2] - C[1][2]*D[2]) - D[0]*(C[1][0]*C[2][2] - C[1][2]*C[2][0]) + C[0][2]*(C[1][0]*D[2] - D[1]*C[2][0]);
                let detZ = C[0][0]*(C[1][1]*D[2] - D[1]*C[2][1]) - C[0][1]*(C[1][0]*D[2] - D[1]*C[2][0]) + D[0]*(C[1][0]*C[2][1] - C[1][1]*D[2]);

                return [detX / det, detY / det, detZ / det];
            } catch(e) { return null; }
        }

        requestAnimationFrame(triangulationLoop);

        let lastLoggedPitchId = "";
        function analyzePitchMetrics() {
            if (trajectory3D.length < 4) return;

            const startPt = trajectory3D[0];
            const endPt = trajectory3D[trajectory3D.length - 1];
            const distance = startPt.Z - endPt.Z;
            const durationSec = (endPt.t - startPt.t) / 1000;

            if (distance > 0.4 && durationSec > 0.02) {
                const speedKMH = Math.round((distance / durationSec) * 3.6);
                if (speedKMH > 30 && speedKMH < 185) {
                    document.getElementById('speed-text').innerHTML = `${speedKMH} <span style="font-size:18px;">km/h</span>`;
                }
            }

            for (let i = 0; i < trajectory3D.length - 1; i++) {
                let p1 = trajectory3D[i], p2 = trajectory3D[i+1];
                if ((p1.Z >= 0 && p2.Z <= 0) || (p1.Z <= 0 && p2.Z >= 0)) {
                    const ratio = Math.abs(p1.Z - p2.Z) === 0 ? 0.5 : p1.Z / (p1.Z - p2.Z);
                    const X_at_0 = p1.X + ratio * (p2.X - p1.X);
                    const Y_at_0 = p1.Y + ratio * (p2.Y - p1.Y);

                    const szLow = parseFloat(document.getElementById('sz-low').value) || 0.5;
                    const szHigh = parseFloat(document.getElementById('sz-high').value) || 1.1;

                    const isStrike = (Math.abs(X_at_0) <= 0.216) && (Y_at_0 >= szLow && Y_at_0 <= szHigh);
                    const resultEl = document.getElementById('result-text');
                    const pitchId = `${Math.round(X_at_0*100)}-${Math.round(Y_at_0*100)}`;

                    if (lastLoggedPitchId !== pitchId) {
                        lastLoggedPitchId = pitchId;
                        if (isStrike) {
                            resultEl.textContent = "STRIKE!";
                            resultEl.style.color = "#ef4444";
                            speak("ストライク");
                        } else {
                            resultEl.textContent = "BALL";
                            resultEl.style.color = "#10b981";
                            speak("ボール");
                        }
                    }
                    break;
                }
            }
        }

        function speak(text) {
            try {
                speechSynthesis.cancel();
                const uttr = new SpeechSynthesisUtterance(text);
                uttr.lang = "ja-JP";
                uttr.rate = 1.2;
                speechSynthesis.speak(uttr);
            } catch(e) {}
        }

        function updatePlots() {
            try {
                const svgFront = document.getElementById('svg-front');
                const svgTop = document.getElementById('svg-top');
                const svgSide = document.getElementById('svg-side');

                const szLow = parseFloat(document.getElementById('sz-low').value) || 0.5;
                const szHigh = parseFloat(document.getElementById('sz-high').value) || 1.1;

                svgFront.innerHTML = `
                    <polygon points="-0.216,1.5 -0.216,1.4 0,1.3 0.216,1.4 0.216,1.5" fill="#334155" opacity="0.3"/>
                    <rect x="-0.216" y="${1.5 - szHigh}" width="0.432" height="${Math.max(0.01, szHigh - szLow)}" fill="none" stroke="#38bdf8" stroke-width="0.02" stroke-dasharray="0.05 0.05"/>
                `;

                svgTop.innerHTML = `
                    <polygon points="-0.216,0 0.216,0 0,-0.3" fill="#ffffff" opacity="0.3"/>
                    <rect x="-0.3" y="18.44" width="0.6" height="0.1" fill="#ffffff" opacity="0.3"/>
                    <line x1="0" y1="0" x2="0" y2="20" stroke="#475569" stroke-width="0.01" stroke-dasharray="0.5 0.5"/>
                `;

                svgSide.innerHTML = `
                    <line x1="-1" y1="2.0" x2="20" y2="2.0" stroke="#475569" stroke-width="0.05"/>
                    <line x1="0" y1="${2.0 - szHigh}" x2="0" y2="${2.0 - szLow}" stroke="#38bdf8" stroke-width="0.02"/>
                `;

                trajectory3D.forEach((pt, idx) => {
                    const opacity = (idx + 1) / trajectory3D.length;
                    svgFront.innerHTML += `<circle cx="${pt.X}" cy="${1.5 - pt.Y}" r="0.03" fill="#f59e0b" opacity="${opacity}" />`;
                    svgTop.innerHTML += `<circle cx="${pt.X}" cy="${pt.Z}" r="0.08" fill="#f59e0b" opacity="${opacity}" />`;
                    svgSide.innerHTML += `<circle cx="${pt.Z}" cy="${2.0 - pt.Y}" r="0.08" fill="#f59e0b" opacity="${opacity}" />`;
                });
            } catch(e) {}
        }

        document.getElementById('sz-low').addEventListener('input', updatePlots);
        document.getElementById('sz-high').addEventListener('input', updatePlots);
        updatePlots();

        document.getElementById('clear-data-btn').onclick = () => {
            trajectory3D = [];
            document.getElementById('result-text').textContent = "READY";
            document.getElementById('result-text').style.color = "#64748b";
            document.getElementById('speed-text').innerHTML = `-- <span style="font-size: 18px;">km/h</span>`;
            updatePlots();
        };
    </script>
</body>
</html>
