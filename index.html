<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ABS プロ・ビデオ判定システム (ホールド機能搭載)</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: row;
            height: 95vh;
        }
        /* 左側：設定パネル */
        #setup-panel {
            width: 320px;
            background-color: #222;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        /* 右側：メインモニター */
        #monitor {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        h2 { margin: 0 0 10px 0; font-size: 20px; color: #00ffff; border-bottom: 2px solid #00ffff; padding-bottom: 5px; }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-size: 14px; color: #ccc; }
        input[type="number"], input[type="range"] {
            padding: 8px;
            background-color: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 5px;
        }
        .id-display {
            font-size: 32px;
            font-weight: bold;
            color: #ffcc00;
            text-align: center;
            background-color: #111;
            padding: 10px;
            border-radius: 5px;
        }
        /* 映像コンテナ（比率3:4） */
        #strike-zone-container {
            width: 450px;
            height: 600px;
            border: 3px dashed #444;
            position: relative;
            background-color: #151515;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        #bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill;
            z-index: 1;
        }
        /* 動的に動くストライクゾーン */
        #dynamic-zone {
            position: absolute;
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            background-color: rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
            z-index: 2;
        }
        /* ボールのドット */
        #ball-dot {
            width: 24px;
            height: 24px;
            background-color: #ffff00;
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            display: none;
            box-shadow: 0 0 15px #ffff00;
            z-index: 3;
            transition: opacity 0.2s; /* 消えるときにふわっと消す */
        }
        #result-display {
            display: flex;
            gap: 40px;
            margin-top: 20px;
            align-items: center;
        }
        #result-text {
            font-size: 80px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(0,0,0,0.8);
        }
        #speed-text {
            font-size: 60px;
            font-weight: bold;
            color: #00ffcc;
            font-family: 'Impact', sans-serif;
        }
        .strike { color: #ff3333; text-shadow: 0 0 20px #ff3333 !important; }
        .ball { color: #33ff33; text-shadow: 0 0 20px #33ff33 !important; }
    </style>
</head>
<body>

    <div id="setup-panel">
        <h2>① 接続設定</h2>
        <div class="id-display" id="my-id">----</div>
        <p style="font-size:12px; color:#aaa; margin:0;">上記4桁をiPhoneに入力</p>

        <h2>② グラウンド設定</h2>
        <div class="control-group">
            <label>投手マウンド〜本塁の距離 (m)</label>
            <input type="number" id="pitch-dist" value="18.44" step="0.1">
        </div>

        <h2>③ ストライクゾーン位置微調整</h2>
        <p style="font-size:12px; color:#aaa; margin:0;">背景の映像を見ながら、実際のベースとバッターの胸〜膝に枠を合わせてください。</p>
        <div class="control-group">
            <label>左右幅 (左端〜右端)</label>
            <input type="range" id="zone-left" min="0" max="100" value="25">
            <input type="range" id="zone-right" min="0" max="100" value="75">
        </div>
        <div class="control-group">
            <label>高低幅 (下端〜上端)</label>
            <input type="range" id="zone-bottom" min="0" max="100" value="75">
            <input type="range" id="zone-top" min="0" max="100" value="25">
        </div>
    </div>

    <div id="monitor">
        <div id="strike-zone-container">
            <video id="bg-video" autoplay playsinline muted></video>
            <div id="dynamic-zone"></div>
            <div id="ball-dot"></div>
        </div>
        <div id="result-display">
            <div id="result-text" style="color: #666;">READY</div>
            <div id="speed-text">-- <span style="font-size:24px;">km/h</span></div>
        </div>
    </div>

    <script>
        const randomNum = Math.floor(1000 + Math.random() * 9000); 
        const myCustomId = `abs-${randomNum}`;
        const peer = new Peer(myCustomId);

        const ballDot = document.getElementById('ball-dot');
        const resultText = document.getElementById('result-text');
        const speedText = document.getElementById('speed-text');
        const dynamicZone = document.getElementById('dynamic-zone');
        const bgVideo = document.getElementById('bg-video');

        const sLeft = document.getElementById('zone-left');
        const sRight = document.getElementById('zone-right');
        const sTop = document.getElementById('zone-top');
        const sBottom = document.getElementById('zone-bottom');

        // 【新常識】投球の全座標を一時保存するリストと、ストップ判定タイマー
        let pitchCoords = [];
        let pitchEndTimer = null;
        let isWaitingForNext = true; // 3秒フリーズ中の連続検知を防ぐフラグ

        peer.on('open', (id) => {
            document.getElementById('my-id').textContent = randomNum;
        });

        // iPhoneの生映像を受信
        peer.on('call', (call) => {
            call.answer();
            call.on('stream', (remoteStream) => {
                bgVideo.srcObject = remoteStream;
                bgVideo.play().catch(e => console.log("Video play error:", e));
            });
        });

        // ストライクゾーンの枠の描画
        function updateZoneDrawing() {
            const containerW = 450;
            const containerH = 600;

            const leftPercent = sLeft.value / 100;
            const rightPercent = sRight.value / 100;
            const topPercent = sTop.value / 100;
            const bottomPercent = sBottom.value / 100;

            const width = (rightPercent - leftPercent) * containerW;
            const height = (bottomPercent - topPercent) * containerH;

            dynamicZone.style.left = `${leftPercent * containerW}px`;
            dynamicZone.style.top = `${topPercent * containerH}px`;
            dynamicZone.style.width = `${width}px`;
            dynamicZone.style.height = `${height}px`;
        }

        [sLeft, sRight, sTop, sBottom].forEach(slider => {
            slider.addEventListener('input', updateZoneDrawing);
        });
        updateZoneDrawing();

        // データ受信時の処理
        peer.on('connection', (conn) => {
            resultText.textContent = "READY";
            resultText.style.color = "#00ffff";
            
            conn.on('data', (data) => {
                if (!isWaitingForNext) return; // フリーズ中のデータは無視

                const containerW = 450;
                const containerH = 600;

                // 1. 今届いた座標を「時間」と一緒に記録する
                pitchCoords.push({
                    x: data.x,
                    y: data.y,
                    time: performance.now()
                });

                // 2. 投げている途中は、うっすら半透明の黄色いドットを動かして表示
                const x = data.x * containerW;
                const y = data.y * containerH;
                ballDot.style.left = `${x - 12}px`;
                ballDot.style.top = `${y - 12}px`;
                ballDot.style.display = 'block';
                ballDot.style.opacity = '0.4'; // 飛行中は半透明

                // 3. 投球ストップ判定（0.4秒間、新しい座標が届かなかったら「捕球された」とみなす）
                clearTimeout(pitchEndTimer);
                pitchEndTimer = setTimeout(() => {
                    processPitchResult(containerW, containerH);
                }, 400); 
            });
        });

        // 投球結果を確定させて「フリーズ」させる関数
        function processPitchResult(w, h) {
            if (pitchCoords.length === 0) return;

            isWaitingForNext = false; // 新しい判定を受け付けないようにロック

            // 投球の最後の1点（キャッチャーミットの手前＝ベース通過点）を取得
            const finalPoint = pitchCoords[pitchCoords.length - 1];

            // 1. 黄色いドットを「超ハッキリ」フリーズ表示！
            const finalX = finalPoint.x * w;
            const finalY = finalPoint.y * h;
            ballDot.style.left = `${finalX - 12}px`;
            ballDot.style.top = `${finalY - 12}px`;
            ballDot.style.opacity = '1.0'; // 完全不透明にして目立たせる
            ballDot.style.boxShadow = '0 0 20px #ffff00, 0 0 10px #ffffff';

            // 2. 球速（km/h）の計算
            if (pitchCoords.length >= 2) {
                const firstPoint = pitchCoords[0];
                const durationSec = (finalPoint.time - firstPoint.time) / 1000; // 投球にかかった秒数

                if (durationSec > 0.1 && durationSec < 1.5) {
                    const distance = parseFloat(document.getElementById('pitch-dist').value);
                    const speedMPS = distance / durationSec;
                    const speedKMH = Math.round(speedMPS * 3.6);

                    if (speedKMH > 30 && speedKMH < 170) {
                        speedText.innerHTML = `${speedKMH} <span style="font-size:24px;">km/h</span>`;
                    }
                }
            }

            // 3. ストライク・ボールの一発判定
            const leftLimit = sLeft.value / 100;
            const rightLimit = sRight.value / 100;
            const topLimit = sTop.value / 100;
            const bottomLimit = sBottom.value / 100;

            if (finalPoint.x >= leftLimit && finalPoint.x <= rightLimit && finalPoint.y >= topLimit && finalPoint.y <= bottomLimit) {
                resultText.textContent = "STRIKE!";
                resultText.className = "strike";
                speak("ストライク！");
            } else {
                resultText.textContent = "BALL";
                resultText.className = "ball";
                speak("ボール");
            }

            // 4. 3秒後に画面をリセットして次の投球に備える
            setTimeout(() => {
                ballDot.style.display = 'none';
                ballDot.style.boxShadow = 'none';
                resultText.textContent = "READY";
                resultText.className = "";
                resultText.style.color = "#00ffff";
                
                // データリセット
                pitchCoords = [];
                isWaitingForNext = true; // ロック解除
            }, 3000);
        }

        function speak(text) {
            speechSynthesis.cancel();
            const uttr = new SpeechSynthesisUtterance(text);
            uttr.lang = "ja-JP";
            uttr.rate = 1.3;
            speechSynthesis.speak(uttr);
        }
    </script>
</body>
</html>
